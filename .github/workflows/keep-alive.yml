name: Keep Render App Awake

on:
  schedule:
    # Run every 14 minutes to keep the Render free tier from spinning down after 15 mins of inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Website
        run: |
          echo "Pinging https://svpersonnel.in/ping to prevent Render sleep..."
          curl -s --max-time 30 https://svpersonnel.in/ping || echo "Ping request sent."
